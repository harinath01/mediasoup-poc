<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student - mediasoup POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      gap: .75rem;
      width: 400px;
    }
    video {
      width: 100%;
      border-radius: 6px;
      background: #000;
    }
    h2 { font-size: 1.1rem; color: #333; }
    input {
      padding: .6rem .75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: .9rem;
      outline: none;
    }
    input:focus { border-color: #4a90d9; }
    button {
      padding: .6rem;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    button.active { background: #28a745; }
    button.active:hover { background: #218838; }
    button.danger { background: #dc3545; }
    button.danger:hover { background: #c82333; }
    .back { font-size: .8rem; color: #888; text-align: center; }
    .back a { color: #4a90d9; }
    .hidden { display: none; }
    .status {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem .75rem; border-radius: 6px; font-size: .9rem;
    }
    .status.connected { background: #e8f5e9; color: #2e7d32; }
    .status.connecting { background: #fff3e0; color: #e65100; }
    .status.failed { background: #ffebee; color: #c62828; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .dot.connected { background: #4caf50; animation: pulse 1.5s infinite; }
    .dot.connecting { background: #ff9800; animation: pulse 1s infinite; }
    .dot.failed { background: #f44336; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: .3; } 100% { opacity: 1; } }
    .controls { display: flex; gap: .5rem; justify-content: center; }
    .controls button {
      width: 48px; height: 48px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.2rem; padding: 0;
    }
    .controls button.active { background: #555; }
    .controls button.active:hover { background: #666; }
    .controls button.danger { background: #c62828; }
    .controls button.danger:hover { background: #e53935; }
  </style>
</head>
<body>
  <div id="joinCard" class="card">
    <h2>Join Room (Student)</h2>
    <input id="name" placeholder="Your name" />
    <input id="roomId" placeholder="Room ID" />
    <button onclick="onJoin()">Join</button>
    <div class="back"><a href="index.html">&larr; Back</a></div>
  </div>

  <div id="activeCard" class="card hidden">
    <div id="statusBar" class="status connecting"><span class="dot connecting"></span> <span id="statusText">Initializing...</span></div>
    <p id="roomInfo" style="font-size:.85rem;color:#666;"></p>
    <video id="localVideo" autoplay muted playsinline></video>
    <div class="controls">
      <button id="btnMic" onclick="toggleMic()">🎤</button>
      <button id="btnCam" onclick="toggleCam()">📹</button>
    </div>
  </div>

  <script type="module" src="student.js"></script>
</body>
</html>
