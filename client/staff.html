<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff - mediasoup POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      gap: .75rem;
      width: 400px;
    }
    .card-wide { width: 90vw; max-width: 1100px; }
    h2 { font-size: 1.1rem; color: #333; }
    input {
      padding: .6rem .75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: .9rem;
      outline: none;
    }
    input:focus { border-color: #4a90d9; }
    button {
      padding: .6rem;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    button.small {
      padding: .3rem .6rem;
      font-size: .8rem;
      background: #28a745;
    }
    button.small:hover { background: #218838; }
    .room-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; max-height: 300px; overflow-y: auto; }
    .room-list li {
      padding: .5rem .75rem;
      border: 1px solid #eee;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .85rem;
    }
    .room-list li .info { display: flex; gap: 1rem; color: #666; }
    .empty { color: #999; font-size: .85rem; text-align: center; padding: 1rem 0; }
    .back { font-size: .8rem; color: #888; text-align: center; }
    .back a { color: #4a90d9; }
    .hidden { display: none; }
    .status {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem .75rem; border-radius: 6px; font-size: .9rem;
    }
    .status.connected { background: #e8f5e9; color: #2e7d32; }
    .status.connecting { background: #fff3e0; color: #e65100; }
    .status.failed { background: #ffebee; color: #c62828; }
    .dot {
      width: 10px; height: 10px; border-radius: 50%;
    }
    .dot.connected { background: #4caf50; animation: pulse 1.5s infinite; }
    .dot.connecting { background: #ff9800; animation: pulse 1s infinite; }
    .dot.failed { background: #f44336; }
    @keyframes pulse { 0% { opacity: 1; } 50% { opacity: .3; } 100% { opacity: 1; } }
    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1rem;
      margin-top: .5rem;
    }
    .video-tile {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
      aspect-ratio: 4 / 3;
    }
    .video-tile video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .video-tile .label {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: .4rem .6rem;
      background: rgba(0,0,0,.6);
      color: #fff;
      font-size: .8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .video-tile .label .mute-btn {
      background: none;
      border: 1px solid rgba(255,255,255,.5);
      color: #fff;
      padding: .15rem .4rem;
      border-radius: 4px;
      font-size: .75rem;
      cursor: pointer;
    }
    .video-tile .label .mute-btn.muted {
      background: rgba(220,53,69,.8);
      border-color: #dc3545;
    }
  </style>
</head>
<body>
  <div id="joinCard" class="card">
    <h2>Staff Panel</h2>

    <input id="name" placeholder="Your name" />
    <button onclick="onRefresh()">Refresh Rooms</button>

    <ul id="roomList" class="room-list">
      <li class="empty">No rooms yet. Refresh to check.</li>
    </ul>

    <div class="back"><a href="index.html">&larr; Back</a></div>
  </div>

  <div id="activeCard" class="card card-wide hidden">
    <div id="statusBar" class="status connecting"><span class="dot connecting"></span> <span id="statusText">Initializing...</span></div>
    <p id="roomInfo" style="font-size:.85rem;color:#666;"></p>
    <div id="videoGrid" class="video-grid"></div>
    <div class="back"><a href="index.html">&larr; Leave</a></div>
  </div>

  <script type="module" src="staff.js"></script>
</body>
</html>
