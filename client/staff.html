<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff - mediasoup POC</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      gap: .75rem;
      width: 400px;
    }
    h2 { font-size: 1.1rem; color: #333; }
    input {
      padding: .6rem .75rem;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: .9rem;
      outline: none;
    }
    input:focus { border-color: #4a90d9; }
    button {
      padding: .6rem;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: .9rem;
      cursor: pointer;
    }
    button:hover { background: #357abd; }
    button.secondary { background: #6c757d; }
    button.secondary:hover { background: #5a6268; }
    .room-list { list-style: none; display: flex; flex-direction: column; gap: .5rem; max-height: 200px; overflow-y: auto; }
    .room-list li {
      padding: .5rem .75rem;
      border: 1px solid #eee;
      border-radius: 6px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: .85rem;
    }
    .room-list li .info { display: flex; gap: 1rem; color: #666; }
    .room-list li .join-btn {
      padding: .3rem .6rem;
      font-size: .8rem;
      background: #28a745;
    }
    .room-list li .join-btn:hover { background: #218838; }
    .empty { color: #999; font-size: .85rem; text-align: center; padding: 1rem 0; }
    .back { font-size: .8rem; color: #888; text-align: center; }
    .back a { color: #4a90d9; }
    .row { display: flex; gap: .5rem; }
    .row input { flex: 1; }
    .row button { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="card">
    <h2>Staff Panel</h2>

    <div class="row">
      <input id="name" placeholder="Your name" />
      <button onclick="onRefresh()" class="secondary">Refresh</button>
    </div>

    <ul id="roomList" class="room-list">
      <li class="empty">No rooms yet. Refresh to check.</li>
    </ul>

    <div class="row">
      <input id="roomId" placeholder="Room ID to join" />
      <button onclick="onJoin()">Join</button>
    </div>

    <div class="back"><a href="index.html">&larr; Back</a></div>
  </div>

  <script type="module" src="staff.js"></script>
</body>
</html>
