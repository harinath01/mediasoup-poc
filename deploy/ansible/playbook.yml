---
- name: Provision mediasoup POC on Hetzner
  hosts: all
  become: true
  vars:
    app_user: ubuntu
    app_dir: "/home/{{ app_user }}/mediasoup-poc"
    app_domain: liveproctoring.tpsentinel.com
    mediasoup_announced_ip: "{{ ansible_host }}"
    server_port: 3001
    node_major_version: 22
    pnpm_version: 10.13.1
    apt_dependencies:
      - build-essential
      - ca-certificates
      - curl
      - git
      - pkg-config
      - python3
      - rsync
      - supervisor
  tasks:
    - name: Refresh apt package index
      ansible.builtin.apt:
        update_cache: true
        cache_valid_time: 3600

    - name: Install system dependencies
      ansible.builtin.apt:
        name: "{{ apt_dependencies }}"
        state: present

    - name: Check current Node.js version
      ansible.builtin.command: node --version
      register: node_version
      changed_when: false
      failed_when: false

    - name: Configure NodeSource repository for Node.js {{ node_major_version }}
      ansible.builtin.shell: |
        curl -fsSL https://deb.nodesource.com/setup_{{ node_major_version }}.x | bash -
      when: node_version.rc != 0 or not (node_version.stdout is match('^v' ~ node_major_version ~ '\\.'))

    - name: Install Node.js
      ansible.builtin.apt:
        name: nodejs
        state: present

    - name: Install pnpm {{ pnpm_version }}
      ansible.builtin.shell: |
        if ! command -v pnpm >/dev/null 2>&1 || [ "$(pnpm --version)" != "{{ pnpm_version }}" ]; then
          npm install -g pnpm@{{ pnpm_version }}
        fi
      args:
        executable: /bin/bash

    - name: Ensure application directories exist
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        owner: "{{ app_user }}"
        group: "{{ app_user }}"
        mode: "0755"
      loop:
        - "{{ app_dir }}"
        - "{{ app_dir }}/server/logs"
        - "{{ app_dir }}/client/logs"

    - name: Install server dependencies
      ansible.builtin.command: pnpm install --frozen-lockfile
      args:
        chdir: "{{ app_dir }}/server"
      become_user: "{{ app_user }}"

    - name: Install client dependencies
      ansible.builtin.command: pnpm install --frozen-lockfile
      args:
        chdir: "{{ app_dir }}/client"
      become_user: "{{ app_user }}"

    - name: Build server
      ansible.builtin.command: pnpm build
      args:
        chdir: "{{ app_dir }}/server"
      become_user: "{{ app_user }}"

    - name: Build client
      ansible.builtin.command: pnpm build
      args:
        chdir: "{{ app_dir }}/client"
      become_user: "{{ app_user }}"

    - name: Install supervisor program definition
      ansible.builtin.template:
        src: templates/mediasoup-poc-supervisor.conf.j2
        dest: /etc/supervisor/conf.d/mediasoup-poc.conf
        owner: root
        group: root
        mode: "0644"

    - name: Ensure supervisor is running
      ansible.builtin.service:
        name: supervisor
        state: started
        enabled: true

    - name: Reload supervisor configuration
      ansible.builtin.command: supervisorctl reread
      changed_when: "'No config updates to processes' not in supervisor_reread.stdout"
      register: supervisor_reread

    - name: Apply supervisor updates
      ansible.builtin.command: supervisorctl update
      register: supervisor_update
      changed_when: "'added process group' in supervisor_update.stdout or 'changed' in supervisor_update.stdout or 'updated process group' in supervisor_update.stdout"

    - name: Restart mediasoup service
      ansible.builtin.command: supervisorctl restart mediasoup-poc
      register: supervisor_restart
      changed_when: "'ERROR' not in supervisor_restart.stdout"
