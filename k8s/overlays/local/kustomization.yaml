apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

images:
  - name: mediasoup-poc
    # k3d imports unqualified local images under this canonical name.
    newName: docker.io/library/mediasoup-poc
    newTag: local

configMapGenerator:
  - name: mediasoup-poc-config
    behavior: replace
    literals:
      # LAN address of the machine running Docker/k3d. Update if this changes.
      - MEDIASOUP_LISTEN_IP=192.168.1.8
      - MEDIASOUP_RTC_MIN_PORT=40000
      - MEDIASOUP_RTC_MAX_PORT=41999

patches:
  - target:
      kind: Ingress
      name: mediasoup-poc
    patch: |-
      - op: replace
        path: /spec/rules/0/host
        value: liveproctoring.localhost
