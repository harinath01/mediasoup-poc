# Values for prometheus-community/kube-prometheus-stack.
# Grafana is intentionally kept behind a Kubernetes Service; expose it only
# after choosing DNS/TLS and credentials for the real cluster.
grafana:
  adminPassword: welcome 
  # Grafana stores its data on a local-path volume.  Keep that volume on the
  # stable control-plane/media node, never on short-lived k6 runner nodes.
  nodeSelector:
    workload: mediasoup
  persistence:
    enabled: true
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

prometheus:
  prometheusSpec:
    # k6 browser runners push their short-lived test metrics here. Prometheus
    # continues to scrape mediasoup through the ServiceMonitor below.
    enableRemoteWriteReceiver: true
    retention: 15d
    # Prometheus has a local-path volume too, so it must remain on the stable
    # media node while Terraform creates and destroys k6 runner nodes.
    nodeSelector:
      workload: mediasoup
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
  additionalServiceMonitors:
    - name: mediasoup-poc
      namespaceSelector:
        matchNames:
          - liveproctoring
      selector:
        matchLabels:
          app.kubernetes.io/name: mediasoup-poc
      endpoints:
        - port: http
          path: /metrics
          interval: 15s
