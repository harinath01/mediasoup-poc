# Values for prometheus-community/kube-prometheus-stack.
# Grafana is intentionally kept behind a Kubernetes Service; expose it only
# after choosing DNS/TLS and credentials for the real cluster.
grafana:
  adminPassword: welcome 
  persistence:
    enabled: true
    size: 5Gi
  sidecar:
    dashboards:
      enabled: true
      searchNamespace: ALL

prometheus:
  prometheusSpec:
    # k6 browser runners push their short-lived test metrics here. Prometheus
    # continues to scrape mediasoup through the ServiceMonitor below.
    enableRemoteWriteReceiver: true
    retention: 15d
    storageSpec:
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 20Gi
  additionalServiceMonitors:
    - name: mediasoup-poc
      namespaceSelector:
        matchNames:
          - liveproctoring
      selector:
        matchLabels:
          app.kubernetes.io/name: mediasoup-poc
      endpoints:
        - port: http
          path: /metrics
          interval: 15s
