apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: liveproctoring

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml

images:
  - name: mediasoup-poc
    newName: mediasoup-poc
    newTag: latest

configMapGenerator:
  - name: mediasoup-poc-config
    literals:
      # deploy/apply-k3s.sh replaces this with Terraform's public IPv4 before
      # restarting the Pod. Do not use the base directly for a real deployment.
      - MEDIASOUP_LISTEN_IP=CHANGE_ME
      - MEDIASOUP_RTC_MIN_PORT=40000
      - MEDIASOUP_RTC_MAX_PORT=41999

generatorOptions:
  disableNameSuffixHash: true
